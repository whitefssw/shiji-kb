<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>史记事件地铁图</title>
<link rel="stylesheet" href="metro.css">
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>史记地铁图</h1>
    <div class="sub">130线路 / 3197站点</div>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="搜索事件、人物、地点...">
  </div>
  <div class="sidebar-body" id="sidebarBody"></div>
</div>

<div class="main" id="mainArea">
  <!-- Fixed timeline rulers at top and bottom -->
  <div class="timeline-ruler timeline-top" id="timelineTop"></div>
  <div class="timeline-ruler timeline-bottom" id="timelineBottom"></div>

  <svg id="metroSvg"></svg>
  <div class="detail-panel" id="detailPanel">
    <button class="panel-close" id="panelClose">&times;</button>
    <div class="panel-header">
      <div class="panel-title" id="panelTitle"></div>
      <div class="panel-meta" id="panelMeta"></div>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <div class="bottom-bar" id="bottomBar">
    <span class="era" id="eraLabel"></span>
    <span id="yearLabel"></span>
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">&minus;</button>
    <button class="zoom-btn" id="zoomFit">&#9744;</button>
  </div>
  <div class="stats" id="stats"></div>
</div>

<script src="metro.js"></script>
</body>
</html>
